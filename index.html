* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--dark);
  color: var(--cream);
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  overflow: hidden;
}

/* Atmospheric background */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.bg-gradient {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(139,107,74,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 15% 20%, rgba(139,107,74,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 10%, rgba(196,168,130,0.04) 0%, transparent 60%);
}

/* Grain overlay */
.bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
}

/* Thin horizontal line accent */
.line-top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0.5;
  z-index: 10;
}

.line-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0.3;
  z-index: 10;
}

/* Main layout */
.wrapper {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 36px clamp(24px, 6vw, 80px);
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  opacity: 0;
  animation: fadeUp 1s ease 0.2s forwards;
}

.header-left {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-muted);
  line-height: 1.8;
}

.header-right {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: right;
  line-height: 1.8;
}

/* Center content */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 0;
}

/* MILOR Logo SVG crest */
.crest {
  width: clamp(60px, 8vw, 90px);
  margin-bottom: clamp(20px, 3vw, 32px);
  opacity: 0;
  animation: fadeUp 1.2s ease 0.4s forwards;
}

/* MILOR wordmark */
.wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4rem, 13vw, 10rem);
  font-weight: 300;
  letter-spacing: 0.25em;
  line-height: 0.9;
  color: var(--cream);
  opacity: 0;
  animation: fadeUp 1.2s ease 0.5s forwards;
}

.divider-line {
  width: clamp(40px, 6vw, 80px);
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: clamp(20px, 3vw, 32px) auto;
  opacity: 0;
  animation: fadeIn 1s ease 0.8s forwards;
}

.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.9rem, 2.2vw, 1.3rem);
  font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--gold-light);
  margin-bottom: clamp(28px, 4vw, 48px);
  opacity: 0;
  animation: fadeUp 1s ease 0.9s forwards;
}

.coming-soon-label {
  font-size: 0.6rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp 1s ease 1s forwards;
}

/* Email form */
.form-wrap {
  display: flex;
  width: clamp(280px, 40vw, 460px);
  border: 1px solid rgba(139,107,74,0.35);
  opacity: 0;
  animation: fadeUp 1s ease 1.1s forwards;
  transition: border-color 0.3s;
}

.form-wrap:focus-within {
  border-color: rgba(139,107,74,0.7);
}

.form-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 14px 20px;
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: var(--cream);
}

.form-wrap input::placeholder {
  color: rgba(154,136,120,0.5);
  letter-spacing: 0.15em;
}

.form-wrap button {
  background: var(--gold);
  border: none;
  padding: 14px 22px;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--cream);
  cursor: pointer;
  transition: background 0.3s;
  white-space: nowrap;
}

.form-wrap button:hover {
  background: #a07855;
}

/* Pillars strip */
.pillars {
  display: flex;
  gap: clamp(16px, 3vw, 40px);
  margin-top: clamp(28px, 4vw, 48px);
  opacity: 0;
  animation: fadeUp 1s ease 1.3s forwards;
}

.pillar {
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-muted);
  position: relative;
}

.pillar::after {
  content: '·';
  position: absolute;
  right: calc(-1 * clamp(10px, 1.8vw, 24px));
  top: 0;
  color: var(--gold);
  opacity: 0.5;
}

.pillar:last-child::after { display: none; }

/* Footer */
footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  opacity: 0;
  animation: fadeUp 1s ease 1.4s forwards;
}

.footer-left {
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(154,136,120,0.4);
}

.footer-right {
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(154,136,120,0.4);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Success state */
.success-msg {
  display: none;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--gold-light);
  letter-spacing: 0.05em;
  padding: 14px 0;
}

  </div>

  <script>
    function handleJoin() {
      const input = document.getElementById('emailInput');
      const formWrap = document.getElementById('formWrap');
      const successMsg = document.getElementById('successMsg');
      if (input.value && input.value.includes('@')) {
        formWrap.style.display = 'none';
        successMsg.style.display = 'block';
      } else {
        input.style.borderBottom = '1px solid rgba(139,107,74,0.6)';
        input.focus();
      }
    }
    document.getElementById('emailInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleJoin();
    });
  </script>
