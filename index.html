* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--cream);
  color: var(--black);
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  overflow: hidden;
}

/* Subtle vignette */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.06) 100%);
  pointer-events: none;
  z-index: 0;
}

.line-top {
  position: fixed; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent, rgba(139,107,74,0.4), transparent);
  z-index: 10;
}
.line-bottom {
  position: fixed; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent, rgba(139,107,74,0.3), transparent);
  z-index: 10;
}

.wrapper {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 36px clamp(24px, 6vw, 80px);
}

header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  opacity: 0;
  animation: fadeUp 1s ease 0.2s forwards;
}

.header-left, .header-right {
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-muted);
  line-height: 1.9;
}
.header-right { text-align: right; }

.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* Real MILOR logo */
.logo-img {
  width: clamp(180px, 28vw, 360px);
  margin-bottom: clamp(20px, 3vw, 36px);
  opacity: 0;
  animation: fadeUp 1.2s ease 0.3s forwards;
}

.divider-line {
  width: clamp(40px, 6vw, 70px);
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: 0 auto clamp(16px, 2.5vw, 28px);
  opacity: 0;
  animation: fadeIn 1s ease 0.7s forwards;
}

.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.9rem, 2vw, 1.25rem);
  font-weight: 300;
  letter-spacing: 0.06em;
  color: var(--gold);
  margin-bottom: clamp(24px, 3.5vw, 44px);
  opacity: 0;
  animation: fadeUp 1s ease 0.8s forwards;
}

.coming-soon-label {
  font-size: 0.58rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 18px;
  opacity: 0;
  animation: fadeUp 1s ease 0.9s forwards;
}

.form-wrap {
  display: flex;
  width: clamp(260px, 38vw, 440px);
  border: 1px solid rgba(139,107,74,0.35);
  background: rgba(255,255,255,0.3);
  opacity: 0;
  animation: fadeUp 1s ease 1s forwards;
  transition: border-color 0.3s;
}
.form-wrap:focus-within { border-color: rgba(139,107,74,0.65); }

.form-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 13px 18px;
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: var(--black);
}
.form-wrap input::placeholder { color: rgba(122,110,100,0.5); letter-spacing: 0.14em; }

.form-wrap button {
  background: var(--black);
  border: none;
  padding: 13px 22px;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 0.58rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--cream);
  cursor: pointer;
  transition: background 0.3s;
  white-space: nowrap;
}
.form-wrap button:hover { background: var(--gold); }

.pillars {
  display: flex;
  gap: clamp(14px, 2.5vw, 36px);
  margin-top: clamp(24px, 3.5vw, 44px);
  opacity: 0;
  animation: fadeUp 1s ease 1.2s forwards;
}
.pillar {
  font-size: 0.52rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-muted);
  position: relative;
}
.pillar::after {
  content: '·';
  position: absolute;
  right: calc(-1 * clamp(9px, 1.5vw, 22px));
  color: var(--gold);
  opacity: 0.5;
}
.pillar:last-child::after { display: none; }

.success-msg {
  display: none;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 0.05em;
  padding: 13px 0;
}

footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  opacity: 0;
  animation: fadeUp 1s ease 1.3s forwards;
}
.footer-left, .footer-right {
  font-size: 0.52rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(122,110,100,0.45);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

  <script>
    function handleJoin() {
      const input = document.getElementById('emailInput');
      const formWrap = document.getElementById('formWrap');
      const successMsg = document.getElementById('successMsg');

        formWrap.style.display = 'none';

    });
