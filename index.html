body {
  background-color: #0a0a0a;
  color: #f0ece4;
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Subtle background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(139, 107, 74, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(139, 107, 74, 0.05) 0%, transparent 50%);
  pointer-events: none;
}

.container {
  text-align: center;
  padding: 2rem;
  position: relative;
  z-index: 1;
}

.paw {
  font-size: 1.8rem;
  margin-bottom: 2.5rem;
  opacity: 0.6;
  letter-spacing: 8px;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3.5rem, 10vw, 7rem);
  font-weight: 300;
  letter-spacing: 0.3em;
  line-height: 1;
  margin-bottom: 0.5rem;
  color: #f0ece4;
}

.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.85rem, 2vw, 1.1rem);
  font-weight: 300;
  letter-spacing: 0.15em;
  color: #8b6b4a;
  margin-bottom: 4rem;
}

.divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(to right, transparent, #8b6b4a, transparent);
  margin: 0 auto 4rem;
}

.message {
  font-size: clamp(0.7rem, 1.5vw, 0.85rem);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #a09080;
  margin-bottom: 1.5rem;
}

.sub-message {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  font-weight: 300;
  color: #c8bfb0;
  margin-bottom: 4rem;
  line-height: 1.6;
}

.email-form {
  display: flex;
  gap: 0;
  max-width: 420px;
  margin: 0 auto 5rem;
  border: 1px solid rgba(139, 107, 74, 0.4);
}

.email-form input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 14px 20px;
  color: #f0ece4;
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  outline: none;
}

.email-form input::placeholder {
  color: #5a5045;
  letter-spacing: 0.15em;
}

.email-form button {
  background: #8b6b4a;
  border: none;
  padding: 14px 24px;
  color: #f0ece4;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.3s ease;
}

.email-form button:hover {
  background: #a07855;
}

.footer {
  position: fixed;
  bottom: 2rem;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #3a3530;
}

  <div class="container">

    <div class="divider"></div>
    <div class="message">Bientôt disponible</div>
    <div class="sub-message">
      Quelque chose d'exceptionnel se prépare.<br>
      Pour ceux qui savent que leurs chiens méritent le meilleur.
    </div>
    <div class="email-form">
      <input type="email" placeholder="Votre adresse email">
      <button>Rejoindre</button>
    </div>
  </div>

  <div class="footer">milor.dog &nbsp;·&nbsp; © 2025</div>
